<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060818"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#060818"/>
    </linearGradient>
    <linearGradient id="starGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" style="stop-color:#060818" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glowCenter)"/>

  <!-- HR text centered -->
  <g filter="url(#textGlow)">
    <text
      x="256"
      y="320"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="220"
      font-weight="900"
      text-anchor="middle"
      letter-spacing="8"
    >
      <tspan fill="white">H</tspan><tspan fill="url(#starGold)">R</tspan>
    </text>
  </g>

</svg>
